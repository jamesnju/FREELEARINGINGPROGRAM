<section class="donations">
    <div class="container">
        <div class="donations-wrapper">
            <div class="donation-info">
                <h2>Support A Student's Future</h2>
                <p>Your donation provides:</p>
                <ul>
                    <li>📚 Learning materials for one year - $50</li>
                    <li>💻 Tablet for digital learning - $150</li>
                    <li>🎓 Full scholarship for one student - $500</li>
                    <li>🏫 Support a whole classroom - $2000</li>
                </ul>
                <div class="current-goal">
                    <h4>Current Goal: $50,000</h4>
                    <div class="progress-bar">
                        <div class="progress" style="width: 45%"></div>
                    </div>
                    <p>Raised: $22,500 | Goal: $50,000</p>
                </div>
            </div>
            
            <div class="donation-form">
                <h3>Make a Donation</h3>
                <form id="donationForm">
                    <select id="amount" required>
                        <option value="">Select Amount</option>
                        <option value="50">$50</option>
                        <option value="150">$150</option>
                        <option value="500">$500</option>
                        <option value="2000">$2000</option>
                        <option value="other">Other Amount</option>
                    </select>
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email" required>
                    <button type="submit" class="btn btn-primary">Donate Now</button>
                </form>
                <div id="payment-message"></div>
            </div>
        </div>
    </div>
</section>
